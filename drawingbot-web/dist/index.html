<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrawingBot V3 Clone - GPU Accelerated</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #1a1a2e;
            color: #eee;
        }
        
        #container {
            display: flex;
            height: 100vh;
        }
        
        #canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        
        #sidebar {
            width: 350px;
            background: #16213e;
            padding: 20px;
            overflow-y: auto;
            border-left: 2px solid #0f3460;
        }
        
        .panel {
            background: #0f3460;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .panel h3 {
            margin-bottom: 12px;
            color: #e94560;
            font-size: 16px;
        }
        
        .control-group {
            margin-bottom: 12px;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #ccc;
        }
        
        input[type="range"] {
            width: 100%;
            margin: 5px 0;
        }
        
        input[type="color"],
        input[type="number"],
        select {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 4px;
            background: #1a1a2e;
            color: #eee;
            margin-top: 5px;
        }
        
        button {
            width: 100%;
            padding: 10px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 8px;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #ff6b6b;
        }
        
        button.secondary {
            background: #0f3460;
        }
        
        button.secondary:hover {
            background: #1a4a7a;
        }
        
        #stats {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 100;
        }
        
        .value-display {
            float: right;
            color: #e94560;
            font-weight: bold;
        }
    </style>
  <script type="module" crossorigin src="/assets/index-D3Hy3XkD.js"></script>
</head>
<body>
    <div id="container">
        <div id="canvas-container">
            <div id="stats">
                <div>FPS: <span id="fps">0</span></div>
                <div>Points: <span id="point-count">0</span></div>
                <div>GPU Memory: <span id="gpu-memory">0</span> MB</div>
            </div>
        </div>
        <div id="sidebar">
            <div class="panel">
                <h3>🎨 Brush Settings</h3>
                <div class="control-group">
                    <label>Brush Size <span class="value-display" id="brush-size-value">2.0</span></label>
                    <input type="range" id="brush-size" min="0.1" max="20" step="0.1" value="2">
                </div>
                <div class="control-group">
                    <label>Brush Color</label>
                    <input type="color" id="brush-color" value="#e94560">
                </div>
                <div class="control-group">
                    <label>Opacity <span class="value-display" id="opacity-value">1.0</span></label>
                    <input type="range" id="opacity" min="0.1" max="1" step="0.01" value="1">
                </div>
                <div class="control-group">
                    <label>Flow <span class="value-display" id="flow-value">0.5</span></label>
                    <input type="range" id="flow" min="0.01" max="1" step="0.01" value="0.5">
                </div>
            </div>
            
            <div class="panel">
                <h3>✏️ Stroke Type</h3>
                <select id="stroke-type">
                    <option value="continuous">Continuous Line</option>
                    <option value="stippling">Stippling (Dots)</option>
                    <option value="hatching">Hatching</option>
                    <option value="crosshatch">Cross-Hatching</option>
                    <option value="zigzag">Zigzag Pattern</option>
                </select>
                <div class="control-group" style="margin-top: 10px;">
                    <label>Pattern Density <span class="value-display" id="density-value">50</span></label>
                    <input type="range" id="density" min="10" max="200" step="1" value="50">
                </div>
            </div>
            
            <div class="panel">
                <h3>🖼️ Canvas</h3>
                <button id="clear-canvas">Clear Canvas</button>
                <button id="export-png" class="secondary">Export PNG</button>
                <button id="export-svg" class="secondary">Export SVG</button>
            </div>
            
            <div class="panel">
                <h3>⚙️ Performance</h3>
                <div class="control-group">
                    <label>Max Points <span class="value-display" id="max-points-value">50000</span></label>
                    <input type="range" id="max-points" min="1000" max="500000" step="1000" value="50000">
                </div>
                <button id="optimize" class="secondary">Optimize Paths</button>
            </div>
        </div>
    </div>
    
</body>
</html>
